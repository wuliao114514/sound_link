name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        default: 'v0.1.1'
        type: string

permissions:
  contents: write

env:
  AUTHOR: CmzYa
  REPO: sound_link
  REPO_URL: https://github.com/CmzYa/sound_link

jobs:
  validate-tag:
    name: 校验 Tag 来源并提取版本
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验 Tag 指向 main 分支提交
        run: |
          set -euo pipefail
          git fetch origin main --no-tags
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "❌ 当前 tag (${GITHUB_REF_NAME}) 对应提交不在 main 分支上"
            exit 1
          fi
          echo "✅ Tag 来源校验通过"

      - name: 提取版本信息
        id: meta
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.version || github.ref_name }}"
          VERSION="$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "❌ 无法从 tag 提取版本号: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 发布版本: $VERSION"

  build-windows:
    name: 构建 Windows 版本
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            arch: 'amd64'
          - platform: 'windows-11-arm'
            args: ''
            arch: 'arm64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: 安装前端依赖
        run: npm install

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.validate-tag.outputs.tag }}
          releaseName: "Sound Link v${{ needs.validate-tag.outputs.version }}"
          releaseBody: |
            ## Sound Link v${{ needs.validate-tag.outputs.version }}
            
            > 可视化音频设备切换工具
            
            ### 功能特点
            - 🎧 可视化显示系统音频设备
            - ⚡ 一键切换音频输出设备
            - 🌙 跟随系统主题（深色/浅色模式）
            - 🎨 跟随系统主题色
            - ✨ 高级毛玻璃材质效果
            
            ### 下载说明
            | 平台 | 架构 | 文件格式 |
            |------|------|----------|
            | Windows | x64 | `.msi` / `.exe` |
            | Windows | ARM64 | `.msi` / `.exe` |
            
            ### 安装依赖
            使用前需安装 [AudioDeviceCmdlets](https://github.com/frgnca/AudioDeviceCmdlets) PowerShell 模块：
            ```powershell
            Install-Module -Name AudioDeviceCmdlets -Force
            ```
            
            ---
            
            **作者**: [@CmzYa](https://github.com/CmzYa)  
            **仓库**: [https://github.com/CmzYa/sound_link](https://github.com/CmzYa/sound_link)  
            **许可证**: MIT License
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
