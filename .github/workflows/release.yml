name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.0)'
        required: true
        default: 'v'
        type: string

permissions:
  contents: write

env:
  AUTHOR: CmzYa
  REPO: sound_link
  REPO_URL: https://github.com/CmzYa/sound_link

jobs:
  prepare-version:
    name: 准备版本号并同步文件
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取当前版本号
        id: current
        run: |
          set -euo pipefail
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "当前文件版本: $CURRENT_VERSION"
          echo ""
          echo "📋 当前版本号: $CURRENT_VERSION"
          echo "   请在手动触发时输入新版本号（如: v0.1.4）"

      - name: 确定目标版本
        id: version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          VERSION="$(echo "$INPUT_VERSION" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "❌ 无法从输入提取版本号: $INPUT_VERSION"
            exit 1
          fi
          TAG="v$VERSION"
          
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "目标版本: $VERSION"

      - name: 获取提交记录
        id: commits
        run: |
          set -euo pipefail
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "上次发布: $LAST_TAG"
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges > /tmp/commits.txt
          else
            echo "首次发布，获取最近20条提交"
            git log -20 --pretty=format:"- %s (%h)" --no-merges > /tmp/commits.txt
          fi
          echo "提交记录已保存到 /tmp/commits.txt"

      - name: 生成更新日志
        id: changelog
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let commits = '';
            try {
              commits = fs.readFileSync('/tmp/commits.txt', 'utf8');
            } catch (e) {
              commits = '';
            }
            const version = '${{ steps.version.outputs.version }}';
            
            let changelogContent = '';
            
            if (!commits || commits.trim() === '') {
              changelogContent = '### 🚀 新功能与改进\n\n- 版本更新';
            } else {
              const prompt = '请根据以下 Git 提交记录，生成一份简洁的更新日志（中文）。\n\n' +
                '版本号: v' + version + '\n\n' +
                '提交记录:\n' + commits + '\n\n' +
                '要求:\n' +
                '1. 按功能分类（新功能、改进、修复等）\n' +
                '2. 每类列出 2-5 条主要更新\n' +
                '3. 使用 emoji 增强可读性\n' +
                '4. 保持简洁，不要冗余\n' +
                '5. 只输出更新日志内容，不要其他说明\n\n' +
                '格式示例:\n' +
                '### ✨ 新功能\n' +
                '- 添加 xxx 功能\n\n' +
                '### 🔧 改进\n' +
                '- 优化 xxx 性能\n\n' +
                '### 🐛 修复\n' +
                '- 修复 xxx 问题';

              let aiSuccess = false;
              try {
                const response = await fetch('http://ai.little100.cn/v1/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Authorization': 'Bearer ' + process.env.AI_API_KEY,
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    model: 'gpt-5.3-codex-high',
                    messages: [{ role: 'user', content: prompt }],
                    max_tokens: 1000,
                    temperature: 0.7
                  })
                });
                
                if (response.ok) {
                  const data = await response.json();
                  const aiContent = data.choices[0]?.message?.content;
                  if (aiContent && aiContent.trim()) {
                    changelogContent = aiContent;
                    aiSuccess = true;
                    console.log('更新日志已生成');
                  }
                } else {
                  console.log('API 响应错误:', response.status);
                }
              } catch (error) {
                console.log('AI 生成失败:', error.message);
              }
              
              if (!aiSuccess) {
                console.log('使用提交记录作为更新日志');
                changelogContent = '### 📝 提交记录\n\n' + commits;
              }
            }
            
            const fullBody = '## Sound Link v' + version + '\n\n' +
              changelogContent + '\n\n' +
              '---\n\n' +
              '### 📥 下载说明\n' +
              '| 平台 | 架构 | 文件格式 |\n' +
              '|------|------|----------|\n' +
              '| Windows | x64 | `.msi` / `.exe` |\n' +
              '| Windows | ARM64 | `.msi` / `.exe` |\n\n' +
              '### 📦 安装依赖\n' +
              '使用前需安装 [AudioDeviceCmdlets](https://github.com/frgnca/AudioDeviceCmdlets) PowerShell 模块：\n' +
              '```powershell\n' +
              'Install-Module -Name AudioDeviceCmdlets -Force\n' +
              '```\n\n' +
              '---\n\n' +
              '**作者**: [@CmzYa](https://github.com/CmzYa)  \n' +
              '**仓库**: [https://github.com/CmzYa/sound_link](https://github.com/CmzYa/sound_link)  \n' +
              '**许可证**: GPL-3.0 License';
            
            fs.writeFileSync('/tmp/changelog.md', fullBody);
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传更新日志
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: /tmp/changelog.md
          retention-days: 1

      - name: 同步版本号到文件
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          
          if [ "$VERSION" != "$CURRENT" ]; then
            echo "更新版本号: $CURRENT -> $VERSION"
            
            # 更新 package.json
            jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
            mv package.json.tmp package.json
            
            # 更新 tauri.conf.json
            jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tauri.conf.json.tmp
            mv tauri.conf.json.tmp src-tauri/tauri.conf.json
            
            # 更新 Cargo.toml
            sed -i "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml
            
            echo "✅ 版本号已同步到所有文件"
          else
            echo "版本号未变化，跳过同步"
          fi

      - name: 提交版本更新
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          CURRENT="${{ steps.current.outputs.version }}"
          
          if [ "$VERSION" != "$CURRENT" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: bump version to $VERSION"
            git push
            echo "✅ 版本更新已提交"
          fi

  validate-tag:
    name: 校验发布信息
    needs: prepare-version
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ needs.prepare-version.outputs.tag }}
      version: ${{ needs.prepare-version.outputs.version }}
    steps:
      - name: 下载更新日志
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: /tmp

      - name: 显示发布信息
        run: |
          echo "✅ 手动触发发布"
          echo "✅ 发布版本: ${{ needs.prepare-version.outputs.version }}"
          echo ""
          echo "📝 更新日志:"
          cat /tmp/changelog.md

  build-windows:
    name: 构建 Windows 版本
    needs: validate-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
            arch: 'amd64'
          - platform: 'windows-11-arm'
            args: ''
            arch: 'arm64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载更新日志
        uses: actions/download-artifact@v4
        with:
          name: changelog
          path: /tmp

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 编译产物
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> output/target"

      - name: 安装前端依赖
        run: npm install

      - name: 构建并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.validate-tag.outputs.tag }}
          releaseName: "Sound Link v${{ needs.validate-tag.outputs.version }}"
          releaseBodyFile: /tmp/changelog.md
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
